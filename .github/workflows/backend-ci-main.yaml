name: Backend Main CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  main-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: mvn -B clean test jacoco:report
