# ═══════════════════════════════════════════════════════════
#  LastBite — Full Stack Local Development
# ═══════════════════════════════════════════════════════════
#
#  Khởi chạy toàn bộ:   docker compose up -d --build
#  Chỉ infra (DB):      docker compose up postgres mongodb redis -d
#  Xem logs backend:    docker compose logs -f backend
#  Dừng tất cả:         docker compose down
#  Reset sạch data:     docker compose down -v
#
# ═══════════════════════════════════════════════════════════

name: lastbite-dev

services:

  # ── PostgreSQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lastbite-postgres
    environment:
      POSTGRES_DB: lastbite
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lastbite"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── MongoDB ───────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: lastbite-mongodb
    environment:
      MONGO_INITDB_DATABASE: lastbite
    volumes:
      - mongodata:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lastbite-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── Spring Boot Backend ──────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lastbite-backend
    environment:
      # Server
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: dev

      # PostgreSQL — dùng tên service "postgres" thay vì "localhost"
      # vì trong Docker network, các container gọi nhau bằng tên service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lastbite
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

      # MongoDB — tương tự, dùng tên service "mongodb"
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/lastbite

      # Redis — dùng tên service "redis"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_TIMEOUT: 2s

      # JWT
      JWT_SIGNER_KEY: ${JWT_SIGNER_KEY:-dGhpcy1pcy1hLXBsYWNlaG9sZGVyLWtleS1wbGVhc2UtY2hhbmdlLWl0LWluLXByb2R1Y3Rpb24tZW52aXJvbm1lbnQ=}
      JWT_ACCESS_TOKEN_DURATION: 1800
      JWT_REFRESH_TOKEN_DURATION: 604800

      # CORS
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  mongodata:
  redisdata:
