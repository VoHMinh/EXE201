spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── PostgreSQL (JPA) ──────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # ── Flyway DB Migration ───────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT}
      repositories:
        enabled: false

  # ── Mail (Gmail SMTP) ──────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

# ── Server ────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}

# ── JWT ───────────────────────────────────────────
jwt:
  signer-key: ${JWT_SIGNER_KEY}
  access-token-duration: ${JWT_ACCESS_TOKEN_DURATION:900}
  refresh-token-duration: ${JWT_REFRESH_TOKEN_DURATION:604800}

# ── Application ───────────────────────────────────
app:
  admin:
    email: ${ADMIN_EMAIL:admin@lastbite.com}
    password: ${ADMIN_PASSWORD:Admin@123456}
    full-name: ${ADMIN_FULL_NAME:LastBite Admin}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  auth:
    email-verification-url: ${APP_AUTH_EMAIL_VERIFICATION_URL:http://localhost:8080/api/v1/auth/verify-email-link}
    refresh-cookie-secure: ${APP_AUTH_REFRESH_COOKIE_SECURE:false}
    refresh-cookie-same-site: ${APP_AUTH_REFRESH_COOKIE_SAME_SITE:Lax}

# ── Logging ───────────────────────────────────────
logging:
  level:
    root: INFO
    com.LastBite: INFO

# ── Actuator ──────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
