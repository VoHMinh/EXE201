spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── MongoDB: disabled until needed ─────────────
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration
      - org.springframework.boot.mongodb.autoconfigure.MongoDataAutoConfiguration

  # ── PostgreSQL (JPA) ──────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # ── Flyway DB Migration ───────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    out-of-order: true

  # ── MongoDB ───────────────────────────────────
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT}

# ── Server ────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}

# ── JWT ───────────────────────────────────────────
jwt:
  signer-key: ${JWT_SIGNER_KEY}
  access-token-duration: ${JWT_ACCESS_TOKEN_DURATION:1800}
  refresh-token-duration: ${JWT_REFRESH_TOKEN_DURATION:604800}

# ── Application ───────────────────────────────────
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── Logging ───────────────────────────────────────
logging:
  level:
    root: INFO
    com.LastBite: INFO

# ── Actuator ──────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    mongo:
      enabled: false
