# ══════════════════════════════════════════════
#  Test Profile — H2 in-memory (no real DB needed)
# ══════════════════════════════════════════════
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1s
      repositories:
        enabled: false

jwt:
  signer-key: dGVzdC1rZXktZm9yLXVuaXQtdGVzdHMtb25seS1kb25vdC11c2UtaW4tcHJvZHVjdGlvbi1wbGVhc2UtY2hhbmdlLWl0
  access-token-duration: 60
  refresh-token-duration: 120

app:
  cors:
    allowed-origins: http://localhost:3000
